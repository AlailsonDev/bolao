
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bolão CGM</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="background-glow"></div>

  <header class="hero">
    <span id="span-robo">
    <img src="./img/robozim.png" alt="" id="robo">
    <h1 id="titulo"> Bolão CGM</h1>
    </span>
    <p>Veja os palpites e descubra quem acertou o placar!</p>
  </header>

  <main class="container">

    <section class="match-card">
      <div class="team">
        <img id="flag1" class="flag"/>
        <h2 id="team1-name"></h2>
      </div>

      <div class="scoreboard">
        <div class="official-title">PLACAR OFICIAL</div>
        <div class="score">
          <span id="score1">0</span>
          <span class="x">x</span>
          <span id="score2">0</span>
        </div>
      </div>

      <div class="team">
        <img id="flag2" class="flag"/>
        <h2 id="team2-name"></h2>
      </div>
    </section>

    <section>
      <div class="section-title">
        Participantes
      </div>

      <div id="predictions-container" class="predictions-grid"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
